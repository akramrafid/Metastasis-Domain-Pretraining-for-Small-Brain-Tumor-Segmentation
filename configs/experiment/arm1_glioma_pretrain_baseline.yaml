# configs/experiment/arm1_glioma_pretrain_baseline.yaml
# @package _global_

name: "arm1_glioma_pretrain_baseline"

pretrain:
  data: "brats_gli"
  epochs: 100
  lr: 2e-4
  batch_size: 1
  save_interval: 10
  recon_loss_weight: 1.0
  contrast_loss_weight: 1.0
  grad_accum_steps: 8

finetune:
  data: "pretreat_m2b"
  epochs: 50
  lr: 1e-4
  batch_size: 1
  loss_type: "dice_ce"
  pretrained_path: "checkpoints/arm1_encoder_ep100.pt"
  grad_accum_steps: 4
