# configs/experiment/arm2_metastasis_pretrain_proposed.yaml
defaults:
  - override /data: pretreat_m2b

name: "arm2_metastasis_pretrain_proposed"

pretrain:
  data: "pretreat_m2b"
  epochs: 100
  lr: 2e-4
  batch_size: 2
  save_interval: 10
  recon_loss_weight: 1.0
  contrast_loss_weight: 1.0
  grad_accum_steps: 4

finetune:
  data: "pretreat_m2b"
  epochs: 50
  lr: 1e-4
  batch_size: 1
  loss_type: "dice_ce"
  pretrained_path: "checkpoints/arm2_encoder_ep100.pt"
  grad_accum_steps: 4
